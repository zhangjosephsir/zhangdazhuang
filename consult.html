<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费咨询系统 - 张大壮律师</title>
    <style>
        /* All original styles are preserved here */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.8; background: #f8f9fa; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin: 20px 0; color: #159895; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 30px; }
        .lawyer-intro { display: flex; align-items: center; gap: 20px; padding: 20px; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .lawyer-intro .avatar { font-size: 3em; }
        .lawyer-intro .info h2 { font-size: 1.5em; color: #1a5f7a; }
        .lawyer-intro .info p { color: #666; }
        /* Copied all consultation form styles from backup */
        .consultation-form { background: linear-gradient(135deg, #fff 0%, #f8fffe 100%); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(21,152,149,0.15); border: 2px solid #e8f8f5; }
        .consultation-form .form-header { text-align: center; margin-bottom: 30px; }
        .consultation-form .form-header h2 { color: #1a5f7a; font-size: 2em; margin-bottom: 10px; }
        .consultation-form label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 1.05em; }
        .consultation-form input[type="text"], .consultation-form input[type="email"], .consultation-form input[type="tel"], .consultation-form textarea, .consultation-form select { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1em; }
        .consultation-form .submit-btn { width: 100%; background: linear-gradient(135deg, #1a5f7a, #159895); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 1.15em; font-weight: bold; cursor: pointer; }
        .consultation-form .role-selector { display: flex; gap: 15px; flex-wrap: wrap; }
        .consultation-form .role-card { flex: 1; min-width: 120px; cursor: pointer; }
        .consultation-form .role-card input { display: none; }
        .consultation-form .role-card .role-content { border: 2px solid #e0e0e0; border-radius: 12px; padding: 20px 15px; text-align: center; transition: all 0.3s; }
        .consultation-form .role-card .role-icon { font-size: 2em; display: block; margin-bottom: 8px; }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
            padding: 40px 0;
        }
        .stat-item .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #159895;
        }
        .stat-item .label {
            font-size: 1em;
            color: #666;
        }

        @media (max-width: 768px) {
            .stats-section {
                grid-template-columns: repeat(2, 1fr);
            }
            .consultation-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>

        <div class="lawyer-intro">
            <div class="avatar">👨‍⚖️</div>
            <div class="info">
                <h2>张大壮律师</h2>
                <p>三十年民事诉讼经验 | 胜诉率高 | 专业可靠</p>
            </div>
        </div>
        
        <!-- The FULL, correct consultation form from the original site -->
        <div class="consultation-form">
            <div class="form-header">
                <h2>⚡ 免费法律咨询</h2>
                <p>填写以下信息，点击提交后打开邮箱发送咨询（仅工作日回复）</p>
            </div>
            <form id="consultForm" onsubmit="submitForm(event)" autocomplete="off">
                 <!-- Copied all form rows and groups exactly from backup -->
                 <div class="form-row">
                    <div class="form-group">
                        <label>👤 您是 <span class="required">*</span></label>
                        <div class="role-selector">
                           <label class="role-card"><input type="radio" name="role" value="原告" required><div class="role-content"><span class="role-icon">⚖️</span><span class="role-text">原告</span></div></label>
                           <label class="role-card"><input type="radio" name="role" value="被告"><div class="role-content"><span class="role-icon">🛡️</span><span class="role-text">被告</span></div></label>
                           <label class="role-card"><input type="radio" name="role" value="其他"><div class="role-content"><span class="role-icon">💬</span><span class="role-text">其他</span></div></label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📋 纠纷类型</label>
                        <select name="dispute_type" id="disputeType" onchange="toggleOtherInput()"><option value="">请选择</option><option>民间借贷</option><option>合同纠纷</option><option>劳动争议</option><option>其他</option></select>
                        <input type="text" id="disputeTypeOther" name="dispute_type_other" placeholder="请输入纠纷类型" style="display:none; margin-top:10px;">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📝 案情经过</label>
                        <textarea name="description" rows="4"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📧 邮箱 <span class="required">*</span></label>
                        <input type="email" name="contact" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn"><span>📨 提交咨询</span></button>
            </form>
        </div>

        <div class="stats-section">
            <div class="stat-item">
                <div class="number">30+</div>
                <div class="label">年执业经验</div>
            </div>
            <div class="stat-item">
                <div class="number">1000+</div>
                <div class="label">成功案例</div>
            </div>
            <div class="stat-item">
                <div class="number">90%+</div>
                <div class="label">客户满意度</div>
            </div>
            <div class="stat-item">
                <div class="number">500+</div>
                <div class="label">免费法律咨询</div>
            </div>
        </div>

        <footer>
            <p>© 2026 张大壮律师</p>
        </footer>
    </div>
    <script>
        // The FULL, correct JS logic from the original site
        function toggleOtherInput() {
            var select = document.getElementById('disputeType');
            var otherInput = document.getElementById('disputeTypeOther');
            otherInput.style.display = (select.value === '其他') ? 'block' : 'none';
        }
        
        function submitForm(event) {
            event.preventDefault();
            var form = document.getElementById('consultForm');
            var formData = new FormData(form);
            var subject = '法律咨询 - ' + (formData.get('role') || '未知角色');
            var body = '纠纷类型: ' + (formData.get('disputeType') || '未选择') + '%0A' +
                       '案情经过: ' + (formData.get('description') || '未填写') + '%0A' +
                       '联系邮箱: ' + (formData.get('contact') || '未填写');
            window.location.href = 'mailto:376500950@qq.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
        }
    </script>
</body>
</html>
