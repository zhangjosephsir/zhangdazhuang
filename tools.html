<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能法律工具 - 张大壮律师</title>
    <style>
        /* Copied styles from index.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.8; background: #f8f9fa; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%); color: white; padding: 40px 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.2em; margin-bottom: 10px; }
        .tool-container { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .tool { margin-bottom: 40px; }
        .tool h3 { font-size: 1.6em; color: #1a5f7a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #159895; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="number"], input[type="date"], select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: #159895; box-shadow: 0 0 0 4px rgba(21,152,149,0.1); }
        button { background: linear-gradient(135deg, #1a5f7a, #159895); color: white; padding: 15px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 20px; padding: 20px; background: linear-gradient(135deg, #e8f8f5, #d1f2eb); border-radius: 10px; border-left: 5px solid #159895; color: #1a5f7a; }
        .result h4 { margin-top: 0; margin-bottom: 10px; }
        .result p { margin: 5px 0; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .back-link { display: inline-block; margin-bottom: 20px; color: #159895; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
             <h1>🛠️ 智能法律工具</h1>
             <p>由张大壮律师提供，为您快速估算费用与利息</p>
        </header>

        <a href="index.html" class="back-link">&larr; 返回首页</a>

        <div class="tool-container">
            <div class="tool" id="fee-calculator-tool">
                <h3>律师费估算器</h3>
                <div class="form-group">
                    <label for="case-type">案件类型</label>
                    <select id="case-type"><option>劳动争议</option><option>婚姻家事</option><option>合同纠纷</option><option>交通事故</option><option>其他</option></select>
                </div>
                <div class="form-group">
                    <label for="amount">涉及金额 (元)</label>
                    <input type="number" id="amount" placeholder="请输入案件涉及金额">
                </div>
                <button onclick="calculateFee()">估算费用</button>
                <div id="fee-result" class="result" style="display:none;"></div>
            </div>

            <div class="tool" id="interest-calculator-tool">
                <h3>借贷利息计算器</h3>
                <div class="form-group"><label for="principal">本金金额 (元)</label><input type="number" id="principal" placeholder="请输入本金"></div>
                <div class="form-group"><label for="start-date">借款开始日期</label><input type="date" id="start-date"></div>
                <div class="form-group"><label for="end-date">计算截止日期</label><input type="date" id="end-date"></div>
                <div class="form-group">
                    <label>利息类型</label>
                    <input type="radio" id="type-normal" name="interest-type" value="normal" checked onchange="togglePenalty()"> 正常利息 (LPR)
                    <input type="radio" id="type-penalty" name="interest-type" value="penalty" onchange="togglePenalty()"> 违约/罚息
                </div>
                <div class="form-group" id="penalty-multiplier-group" style="display: none;">
                    <label for="penalty-multiplier">罚息倍数 (例如: 1.5)</label>
                    <input type="number" id="penalty-multiplier" value="1.5">
                </div>
                <button onclick="calculateInterest()">计算利息</button>
                <div id="interest-result" class="result" style="display:none;"></div>
            </div>
        </div>

        <footer>
            <p>© 2026 张大壮律师 | 三十年民事诉讼经验</p>
        </footer>
    </div>

    <script>
        // Fee Calculator Logic
        function calculateFee() {
            const amount = parseFloat(document.getElementById('amount').value);
            const resultDiv = document.getElementById('fee-result');
            if (isNaN(amount) || amount < 0) {
                resultDiv.innerHTML = "<h4>错误</h4><p>请输入有效的金额。</p>";
                resultDiv.style.display = 'block';
                return;
            }
            let fee = amount * 0.05;
            if (fee < 5000) { fee = 5000; }
            resultDiv.innerHTML = \`<h4>初步估算结果</h4><p>律师费约为：<strong>¥ \${fee.toFixed(2)}</strong></p><small>注意：此为初步估算，具体费用需根据案情复杂程度协商确定。</small>\`;
            resultDiv.style.display = 'block';
        }

        // Interest Calculator Logic
        function togglePenalty() {
            document.getElementById('penalty-multiplier-group').style.display = 
                document.getElementById('type-penalty').checked ? 'block' : 'none';
        }

        function calculateInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            const resultDiv = document.getElementById('interest-result');

            if (isNaN(principal) || principal <= 0 || !startDate.getTime() || !endDate.getTime() || endDate < startDate) {
                resultDiv.innerHTML = "<h4>错误</h4><p>请输入有效的本金和日期范围。</p>";
                resultDiv.style.display = 'block';
                return;
            }

            const timeDiff = endDate.getTime() - startDate.getTime();
            const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24));
            const totalYears = totalDays / 365;

            const LPR_1Y = 0.030; // 3.0% (as of 2026)
            const LPR_5Y = 0.035; // 3.5% (as of 2026)
            const applicableLPR = totalYears >= 5 ? LPR_5Y : LPR_1Y;
            
            let penaltyMultiplier = 1;
            if (document.getElementById('type-penalty').checked) {
                const multiplier = parseFloat(document.getElementById('penalty-multiplier').value);
                penaltyMultiplier = (!isNaN(multiplier) && multiplier > 0) ? multiplier : 1;
            }

            const dailyRate = applicableLPR / 365;
            const totalInterest = principal * dailyRate * totalDays * penaltyMultiplier;
            
            resultDiv.innerHTML = \`
                <h4>利息计算结果</h4>
                <p><strong>总计息天数：</strong> \${totalDays} 天</p>
                <p><strong>适用LPR年利率：</strong> \${(applicableLPR * 100).toFixed(2)}%</p>
                <p><strong>应付总利息金额：</strong> <strong>¥ \${totalInterest.toFixed(2)}</strong></p>
            \`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
