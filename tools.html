<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能法律工具 - 张大壮律师</title>
    <style>
        /* Styles remain the same as the previous beautiful version */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.8; background: #f8f9fa; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin: 20px 0; color: #159895; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 30px; }
        header { background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%); color: white; padding: 40px 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2em; }
        .tool { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; border-left: 5px solid #159895; }
        .tool h3 { font-size: 1.8em; color: #1a5f7a; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: #333; }
        input[type="number"], input[type="date"], select { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1em; }
        button { width: 100%; background: linear-gradient(135deg, #1a5f7a, #159895); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 1.15em; font-weight: bold; cursor: pointer; }
        .result { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #e8f8f5, #d1f2eb); border-radius: 10px; border-left: 5px solid #159895; display: none; }
        #lpr-status { font-size: 0.9em; color: #888; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>
        <header><h1>🛠️ 智能法律工具</h1></header>

        <!-- Fee Calculator -->
        <div class="tool" id="fee-calculator-tool">
            <!-- ... Fee calculator HTML remains unchanged ... -->
        </div>

        <!-- Penalty Calculator (Now with Real-time LPR) -->
        <div class="tool" id="penalty-calculator-tool">
            <h3>违约金 / 逾期利息计算器 <span id="lpr-status">LPR利率加载中...</span></h3>
            <!-- ... Form inputs remain unchanged ... -->
            <button onclick="calculatePenalty()">开始计算</button>
            <div id="penalty-result" class="result"></div>
        </div>

        <footer><p>© 2026 张大壮律师</p></footer>
    </div>
    <script>
        // Global variable to store the fetched LPR
        let currentLpr = 0.0345; // Default fallback LPR
        const LPR_API_URL = 'https://moonapi.com/api/lpr';

        // Fetch LPR on page load
        document.addEventListener('DOMContentLoaded', function() {
            fetchLpr();
        });

        async function fetchLpr() {
            const statusEl = document.getElementById('lpr-status');
            try {
                const response = await fetch(LPR_API_URL);
                if (!response.ok) throw new Error('Network response was not ok.');
                const data = await response.json();
                // Find the latest 1-year LPR
                if (data && data.data && data.data.length > 0) {
                    const latestLprData = data.data.find(item => item.type === '1年');
                    if(latestLprData) {
                        currentLpr = parseFloat(latestLprData.rate) / 100;
                        statusEl.textContent = `LPR (1年期) 已更新: ${(currentLpr * 100).toFixed(2)}%`;
                        statusEl.style.color = '#159895'; // Green for success
                    } else {
                        throw new Error('1-year LPR not found in API response.');
                    }
                } else {
                     throw new Error('Invalid API response format.');
                }
            } catch (error) {
                console.error('Failed to fetch LPR:', error);
                statusEl.textContent = `LPR自动更新失败，使用预设值: ${(currentLpr * 100).toFixed(2)}%`;
                statusEl.style.color = '#e74c3c'; // Red for error
            }
        }

        // Fee calculator logic (unchanged)
        function calculateFee() {
           // ... same logic as before ...
        }

        // Penalty calculator logic now uses the dynamically fetched LPR
        function calculatePenalty() {
            const principal = parseFloat(document.getElementById('principal').value);
            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            const multiplier = parseFloat(document.getElementById('lpr-multiplier').value);
            const resultDiv = document.getElementById('penalty-result');
            
            // ... input validation remains the same ...

            const LPR_1Y = currentLpr; // Use the fetched LPR!
            const timeDiff = endDate.getTime() - startDate.getTime();
            const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24));
            const annualRate = LPR_1Y * multiplier;
            const totalInterest = principal * (annualRate / 365) * totalDays;
            
            resultDiv.innerHTML = \`
                <h4>计算结果 (基于LPR: ${(LPR_1Y * 100).toFixed(2)}%)</h4>
                <p><strong>总计息天数：</strong> \${totalDays} 天</p>
                <p><strong>适用年利率：</strong> \${(annualRate * 100).toFixed(2)}%</p>
                <p><strong>应付总利息 / 违约金：</strong><br><strong>¥ \${totalInterest.toFixed(2)}</strong></p>
            \`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
