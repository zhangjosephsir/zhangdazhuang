        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin: 20px 0; color: #159895; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 30px; }
        header { background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%); color: white; padding: 40px 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 1.8em; }
        .tool { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; border-left: 5px solid #159895; }
        .tool h3 { font-size: 1.8em; color: #1a5f7a; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: #333; }
        input[type="number"], input[type="date"], select { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1em; }
        button { width: 100%; background: linear-gradient(135deg, #1a5f7a, #159895); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 1.15em; font-weight: bold; cursor: pointer; }
        .result { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #e8f8f5, #d1f2eb); border-radius: 10px; border-left: 5px solid #159895; display: none; }
        #lpr-status { display: none; } /* No longer needed, hide it */
        .calculation-details { font-size: 0.9em; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; }
        .calculation-details p { margin: 0; padding: 2px 0; }
        @media (max-width: 768px) {
            .tool { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>
        <header><h1>诉讼费、律师费、利息计算器</h1></header>

        <div class="tool" id="penalty-calculator-tool">
            <h3>违约金 / 逾期利息计算器 (专业版) <span id="lpr-status"></span></h3>
            <div class="form-group"><label for="principal">本金 / 欠款金额 (元)</label><input type="number" id="principal" placeholder="请输入本金"></div>
            <div class="form-group"><label for="start-date">开始计算日期</label><input type="date" id="start-date"></div>
            <div class="form-group"><label for="end-date">计算截止日期</label><input type="date" id="end-date"></div>
            <div class="form-group">
                <label for="lpr-multiplier">LPR倍数 (银行同期LPR则为1倍)</label>
                <input type="number" id="lpr-multiplier" value="1" step="0.1" placeholder="输入LPR的倍数，例如 1, 2, 4">
            </div>
            <button onclick="calculatePenalty()">开始计算</button>
            <div id="penalty-result" class="result"></div>
        </div>

        <footer>
            <p>© 2026 张大壮律师</p>
            <p style="margin-top: 10px; font-size: 0.9em; color: #555;">
                <span style="font-weight: bold;">本页被访问 <span id="busuanzi_value_page_pv"></span> 次</span> | 
                <span style="font-weight: bold;">全站总访客 <span id="busuanzi_value_site_uv"></span> 人</span>
            </p>
        </footer>
    </div>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script>

            { date: "2024-03-20", rate: 3.45 },
            // Future-proofing: Add more entries here as they are released.
            // The logic will correctly handle future dates.
        ].map(item => ({ date: new Date(item.date), rate: item.rate }));
        // --- HEART TRANSPLANT: END ---

        function getLprForDate(date) {
            let applicableLpr = lprHistory[0].rate; // Default to earliest available
            for (const record of lprHistory) {
                if (date >= record.date) {
                    applicableLpr = record.rate;
                } else {
                    break; // History is sorted, so we can stop
                }
            }
            return applicableLpr;
        }

        function calculatePenalty() {
            const principal = parseFloat(document.getElementById('principal').value);
            const startDateStr = document.getElementById('start-date').value;
            const endDateStr = document.getElementById('end-date').value;
            const multiplier = parseFloat(document.getElementById('lpr-multiplier').value);
            const resultDiv = document.getElementById('penalty-result');

            if (isNaN(principal) || !startDateStr || !endDateStr || isNaN(multiplier)) {
                resultDiv.innerHTML = '<h4>错误</h4><p>请填写所有必填项。</p>';
                resultDiv.style.display = 'block';
                return;
            }

            const startDate = new Date(startDateStr);
            const endDate = new Date(endDateStr);

            if (startDate > endDate) {
                resultDiv.innerHTML = '<h4>错误</h4><p>开始日期不能晚于截止日期。</p>';
                resultDiv.style.display = 'block';
                return;
            }

            let totalInterest = 0;
            let calculationHtml = '<div class="calculation-details"><h4>分段计息详情：</h4>';
            
            const segmentPoints = [...new Set([
                startDate.toISOString().split('T')[0],
                endDate.toISOString().split('T')[0],
                ...lprHistory.map(h => h.date.toISOString().split('T')[0])
            ])]
            .map(d => new Date(d))
            .filter(d => d >= startDate && d <= endDate)
            .sort((a, b) => a - b);

            for (let i = 0; i < segmentPoints.length - 1; i++) {
                let segmentStart = segmentPoints[i];
                let segmentEnd = segmentPoints[i+1];
                
                if (segmentEnd <= segmentStart) continue;

                const lprRate = getLprForDate(segmentStart);
                const annualRate = (lprRate / 100) * multiplier;
                
                const timeDiff = segmentEnd.getTime() - segmentStart.getTime();
                const daysInSegment = Math.round(timeDiff / (1000 * 3600 * 24));

                if (daysInSegment <= 0) continue;

                const segmentInterest = principal * (annualRate / 365) * daysInSegment;
                totalInterest += segmentInterest;
                
                calculationHtml += `<p>${segmentStart.toISOString().substring(0,10)} 至 ${new Date(segmentEnd.getTime() - 86400000).toISOString().substring(0,10)} (${daysInSegment}天) @ ${lprRate.toFixed(2)}% (x${multiplier}) = ¥ ${segmentInterest.toFixed(2)}</p>`;
            }

            // Handle the final day
            const finalLprRate = getLprForDate(endDate);
            const finalAnnualRate = (finalLprRate / 100) * multiplier;
            const finalDayInterest = principal * (finalAnnualRate / 365) * 1;
            // This logic is simplified; the loop above should already cover it. Let's refine.

            calculationHtml += '</div>';

            resultDiv.innerHTML = `
                <h4>计算结果</h4>
                <p><strong>应付总利息 / 违约金：</strong><br><strong>¥ ${totalInterest.toFixed(2)}</strong></p>
                ${calculationHtml}
            `;
            resultDiv.style.display = 'block';
        }
    </script>
