<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>律师费、违约金快速计算 - 张大壮律师</title>
    <style>
        /* [Styles remain largely the same] */
    </style>
</head>
<body>
    <div class="container">
        <header>
             <h1>🛠️ 律师费、违约金快速计算</h1>
             <p>由张大壮律师提供，为您快速估算费用与可得利益</p>
        </header>

        <a href="index.html" class="back-link">&larr; 返回首页</a>

        <div class="tool-container">
            <div class="tool" id="fee-calculator-tool">
                <h3>律师费估算器</h3>
                <!-- ... Fee calculator form ... -->
            </div>

            <div class="tool" id="penalty-calculator-tool">
                <h3>违约金计算器</h3>
                <div class="form-group"><label for="principal">合同/欠款金额 (元)</label><input type="number" id="principal" placeholder="请输入本金"></div>
                <div class="form-group"><label for="start-date">违约开始日期</label><input type="date" id="start-date"></div>
                <div class="form-group"><label for="end-date">计算截止日期</label><input type="date" id="end-date"></div>
                <div class="form-group">
                    <label>违约金计算标准</label>
                    <select id="penalty-type">
                        <option value="lpr_4x">LPR的四倍</option>
                        <option value="contract_daily">按合同约定日利率</option>
                        <option value="contract_total">按合同约定总违约金比例</option>
                    </select>
                </div>
                <div class="form-group" id="contract-rate-group" style="display: none;">
                    <label for="contract-rate">合同约定利率 (例如: 日0.05% 或 总20%)</label>
                    <input type="number" id="contract-rate" step="0.01">
                </div>
                <button onclick="calculatePenalty()">计算违约金</button>
                <div id="penalty-result" class="result" style="display:none;"></div>
            </div>
        </div>
        <!-- ... footer ... -->
    </div>
    <script>
        // ... Fee calculator logic ...

        // Penalty Calculator Logic
        document.getElementById('penalty-type').addEventListener('change', function() {
            const contractGroup = document.getElementById('contract-rate-group');
            contractGroup.style.display = (this.value === 'lpr_4x') ? 'none' : 'block';
        });

        function calculatePenalty() {
            const principal = parseFloat(document.getElementById('principal').value);
            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            const penaltyType = document.getElementById('penalty-type').value;
            const contractRate = parseFloat(document.getElementById('contract-rate').value);
            const resultDiv = document.getElementById('penalty-result');

            // ... [Input validation] ...

            const timeDiff = endDate.getTime() - startDate.getTime();
            const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24));
            
            let totalPenalty = 0;
            let description = '';

            const LPR_1Y = 0.030; // 3.0%
            
            if (penaltyType === 'lpr_4x') {
                const dailyRate = (LPR_1Y * 4) / 365;
                totalPenalty = principal * dailyRate * totalDays;
                description = `按LPR四倍计算，日利率约为\${(dailyRate * 100).toFixed(4)}%`;
            } else if (penaltyType === 'contract_daily') {
                const dailyRate = contractRate / 100;
                totalPenalty = principal * dailyRate * totalDays;
                description = `按合同约定日利率\${contractRate}%计算`;
            } else if (penaltyType === 'contract_total') {
                totalPenalty = principal * (contractRate / 100);
                description = `按合同约定总违约金比例\${contractRate}%计算`;
            }
            
            resultDiv.innerHTML = \`
                <h4>违约金计算结果</h4>
                <p><strong>\${description}</strong></p>
                <p><strong>总计违约天数：</strong> \${totalDays} 天 (仅适用按日计算)</p>
                <p><strong>应付总违约金：</strong> <strong>¥ \${totalPenalty.toFixed(2)}</strong></p>
                <small>注意：此为初步估算，具体金额以法院判决为准。</small>
            \`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
