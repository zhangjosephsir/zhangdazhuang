<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>律师费、违约金快速计算 - 张大壮律师</title>
    <style>
        /* Re-styling tools.html to match the main site's aesthetic */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.8; background: #f8f9fa; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin: 20px 0; color: #159895; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 30px; }
        header { background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%); color: white; padding: 40px 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2em; }
        
        .tool { 
            background: #fff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            margin-bottom: 30px; 
            border-left: 5px solid #159895;
        }
        .tool h3 { font-size: 1.8em; color: #1a5f7a; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: #333; }
        input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #159895;
            box-shadow: 0 0 0 4px rgba(21,152,149,0.1);
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #1a5f7a, #159895);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.15em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(21,152,149,0.3);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #e8f8f5, #d1f2eb);
            border-radius: 10px;
            border-left: 5px solid #159895;
            display: none; /* Initially hidden */
        }
        .result h4 { color: #1a5f7a; margin-bottom: 15px; }
        .result p { color: #333; margin-bottom: 5px; }
        .result strong { font-size: 1.2em; color: #159895; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>
        <header><h1>🛠️ 智能法律工具</h1></header>

        <!-- Fee Calculator (Restyled) -->
        <div class="tool" id="fee-calculator-tool">
            <h3>律师费估算器</h3>
            <div class="form-group">
                <label for="amount">案件争议标的额 (元)</label>
                <input type="number" id="amount" placeholder="请输入案件涉及金额">
            </div>
            <button onclick="calculateFee()">开始估算</button>
            <div id="fee-result" class="result"></div>
        </div>

        <!-- Penalty Calculator (Restyled) -->
        <div class="tool" id="penalty-calculator-tool">
            <h3>违约金 / 逾期利息计算器</h3>
            <div class="form-group"><label for="principal">本金 / 欠款金额 (元)</label><input type="number" id="principal" placeholder="请输入本金"></div>
            <div class="form-group"><label for="start-date">开始计算日期</label><input type="date" id="start-date"></div>
            <div class="form-group"><label for="end-date">计算截止日期</label><input type="date" id="end-date"></div>
            <div class="form-group">
                <label for="lpr-multiplier">LPR倍数 (银行同期LPR则为1倍)</label>
                <input type="number" id="lpr-multiplier" value="1" step="0.1" placeholder="输入LPR的倍数，例如 1, 2, 4">
            </div>
            <button onclick="calculatePenalty()">开始计算</button>
            <div id="penalty-result" class="result"></div>
        </div>

        <footer><p>© 2026 张大壮律师</p></footer>
    </div>
    <script>
        // Fee Calculator Logic (same logic, just triggers styled display)
        function calculateFee() { /* ... same as before ... */ }

        // Penalty/Interest Calculator Logic (same logic, just triggers styled display)
        function calculatePenalty() { /* ... same as before ... */ }

        // Duplicating the script logic here for completeness
        function calculateFee() {
            const amount = parseFloat(document.getElementById('amount').value);
            const resultDiv = document.getElementById('fee-result');
            if (isNaN(amount) || amount <= 0) {
                resultDiv.innerHTML = '<h4>错误</h4><p>请输入有效的案件金额。</p>';
                resultDiv.style.display = 'block';
                return;
            }
            let fee = 0;
            if (amount <= 100000) {
                fee = 5000;
            } else if (amount <= 500000) {
                fee = 100000 * 0.08 + (amount - 100000) * 0.05;
            } else {
                fee = 100000 * 0.08 + 400000 * 0.05 + (amount - 500000) * 0.03;
            }
            resultDiv.innerHTML = \`<h4>初步估算律师费</h4><p>约为：<strong>¥ \${fee.toFixed(2)}</strong></p><small>该结果为风险代理收费初步估算，仅供参考，具体费用需根据案情复杂程度与律师协商确定。</small>\`;
            resultDiv.style.display = 'block';
        }

        function calculatePenalty() {
            const principal = parseFloat(document.getElementById('principal').value);
            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            const multiplier = parseFloat(document.getElementById('lpr-multiplier').value);
            const resultDiv = document.getElementById('penalty-result');

            if (isNaN(principal) || !startDate.getTime() || !endDate.getTime() || isNaN(multiplier)) {
                resultDiv.innerHTML = '<h4>错误</h4><p>请填写所有必填项。</p>';
                resultDiv.style.display = 'block';
                return;
            }
             if (startDate > endDate) {
                resultDiv.innerHTML = '<h4>错误</h4><p>开始日期不能晚于截止日期。</p>';
                resultDiv.style.display = 'block';
                return;
            }
            
            const LPR_1Y = 0.0345; // Using a more realistic LPR
            const timeDiff = endDate.getTime() - startDate.getTime();
            const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24));
            const annualRate = LPR_1Y * multiplier;
            const totalInterest = principal * (annualRate / 365) * totalDays;
            
            resultDiv.innerHTML = \`
                <h4>计算结果</h4>
                <p><strong>总计息天数：</strong> \${totalDays} 天</p>
                <p><strong>适用年利率：</strong> \${(annualRate * 100).toFixed(2)}% (LPR \${(LPR_1Y*100).toFixed(2)}% 的 \${multiplier} 倍)</p>
                <p><strong>应付总利息 / 违约金：</strong><br><strong>¥ \${totalInterest.toFixed(2)}</strong></p>
            \`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
