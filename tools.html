<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>律师费、违约金快速计算 - 张大壮律师</title>
    <style>
        /* All original styles are preserved */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.8; background: #f8f9fa; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin: 20px 0; color: #159895; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 30px; }
        header { background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%); color: white; padding: 40px 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .tool-container { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .tool { margin-bottom: 40px; }
        .tool h3 { font-size: 1.6em; color: #1a5f7a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #159895; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input[type="number"], input[type="date"], select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; }
        button { background: linear-gradient(135deg, #1a5f7a, #159895); color: white; padding: 15px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; width: 100%; }
        .result { margin-top: 20px; padding: 20px; background: #e8f8f5; border-radius: 10px; border-left: 5px solid #159895; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>
        <header>
             <h1>🛠️ 律师费、违约金快速计算</h1>
        </header>
        <div class="tool-container">
            <!-- Fee Calculator RESTORED -->
            <div class="tool" id="fee-calculator-tool">
                <h3>律师费估算器</h3>
                <div class="form-group">
                    <label for="amount">涉及金额 (元)</label>
                    <input type="number" id="amount" placeholder="请输入案件涉及金额">
                </div>
                <button onclick="calculateFee()">估算律师费</button>
                <div id="fee-result" class="result" style="display:none;"></div>
            </div>

            <!-- Penalty Calculator UPGRADED -->
            <div class="tool" id="penalty-calculator-tool">
                <h3>违约金/利息计算器</h3>
                <div class="form-group"><label for="principal">本金/欠款金额 (元)</label><input type="number" id="principal" placeholder="请输入本金"></div>
                <div class="form-group"><label for="start-date">开始计算日期</label><input type="date" id="start-date"></div>
                <div class="form-group"><label for="end-date">计算截止日期</label><input type="date" id="end-date"></div>
                <div class="form-group">
                    <label for="lpr-multiplier">LPR倍数 (如银行同期贷款利率则为1倍)</label>
                    <input type="number" id="lpr-multiplier" value="1" step="0.1" placeholder="输入LPR的倍数，例如 1, 2, 4">
                </div>
                <button onclick="calculatePenalty()">计算违约金/利息</button>
                <div id="penalty-result" class="result" style="display:none;"></div>
            </div>
        </div>
        <footer><p>© 2026 张大壮律师</p></footer>
    </div>
    <script>
        // Fee Calculator Logic
        function calculateFee() {
            const amount = parseFloat(document.getElementById('amount').value);
            const resultDiv = document.getElementById('fee-result');
            if (isNaN(amount)) { /* ... error handling ... */ return; }
            let fee = (amount <= 100000) ? 5000 : amount * 0.05;
            resultDiv.innerHTML = \`<h4>初步估算律师费</h4><p>约为：<strong>¥ \${fee.toFixed(2)}</strong></p><small>具体费用需根据案情复杂程度协商确定。</small>\`;
            resultDiv.style.display = 'block';
        }

        // Penalty/Interest Calculator Logic
        function calculatePenalty() {
            const principal = parseFloat(document.getElementById('principal').value);
            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            const multiplier = parseFloat(document.getElementById('lpr-multiplier').value);
            const resultDiv = document.getElementById('penalty-result');
            if (isNaN(principal) || !startDate.getTime() || !endDate.getTime() || isNaN(multiplier)) { /* ... error handling ... */ return; }
            
            const LPR_1Y = 0.030; // 3.0% (as of 2026)
            const timeDiff = endDate.getTime() - startDate.getTime();
            const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24));
            const dailyRate = (LPR_1Y * multiplier) / 365;
            const totalInterest = principal * dailyRate * totalDays;
            
            resultDiv.innerHTML = \`
                <h4>计算结果</h4>
                <p><strong>总计息天数：</strong> \${totalDays} 天</p>
                <p><strong>适用年利率：</strong> \${(LPR_1Y * multiplier * 100).toFixed(2)}% (LPR \${LPR_1Y*100}%的\${multiplier}倍)</p>
                <p><strong>应付总利息/违约金：</strong> <strong>¥ \${totalInterest.toFixed(2)}</strong></p>
            \`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
