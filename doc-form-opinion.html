<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理意见生成 - 张大壮律师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.8; background: #f8f9fa; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin: 20px 0; color: #159895; text-decoration: none; font-weight: bold; }
        header { background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%); color: white; padding: 40px 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 1.6em; }
        .form-card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .section-title { color: #1a5f7a; font-size: 1.1em; margin: 25px 0 15px; padding-bottom: 8px; border-bottom: 2px solid #57c5b6; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        label .required { color: #e74c3c; }
        input[type="text"], input[type="number"], input[type="date"], textarea, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; font-family: inherit; }
        textarea { min-height: 100px; resize: vertical; }
        .btn { width: 100%; background: linear-gradient(135deg, #1a5f7a, #159895); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .preview-btn { background: #666; margin-top: 15px; }
        .result { margin-top: 30px; padding: 20px; background: #f0f9f8; border-radius: 12px; border-left: 4px solid #159895; display: none; }
        .result h4 { color: #1a5f7a; margin-bottom: 10px; }
        .result pre { white-space: pre-wrap; font-size: 0.95em; line-height: 2; }
        footer { text-align: center; padding: 30px; color: #888; font-size: 0.95em; background: #fff; border-radius: 16px; margin-top: 30px; }
        @media (max-width: 768px) { .form-card { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="documents.html" class="back-link">← 返回文书列表</a>
        <header>
            <h1>⚖️ 代理意见生成</h1>
        </header>

        <div class="form-card">
            <div class="form-group">
                <label>案号</label>
                <input type="text" id="caseNo" placeholder="如：（2026）粤01民初123号">
            </div>
            <div class="form-group">
                <label>案由</label>
                <input type="text" id="caseType" placeholder="如：民间借贷纠纷">
            </div>
            <div class="form-group">
                <label>审理法院</label>
                <input type="text" id="court" placeholder="">
            </div>

            <div class="section-title">👤 当事人信息</div>
            <div class="form-group">
                <label>委托代理人（律师）</label>
                <input type="text" id="lawyer" placeholder="填写律师姓名">
            </div>
            <div class="form-group">
                <label>委托方（当事人）</label>
                <input type="text" id="client" placeholder="">
            </div>
            <div class="form-group">
                <label>对方当事人</label>
                <input type="text" id="opponent" placeholder="">
            </div>

            <div class="section-title">📝 代理意见正文</div>
            <div class="form-group">
                <label>一、我方对案件事实的认定 <span class="required">*</span></label>
                <textarea id="factFindings" placeholder="阐述我方认可的案件事实"></textarea>
            </div>
            <div class="form-group">
                <label>二、我方核心法律观点 <span class="required">*</span></label>
                <textarea id="legalOpinions" placeholder="阐述主要法律观点和适用法律"></textarea>
            </div>
            <div class="form-group">
                <label>三、对对方观点的反驳</label>
                <textarea id="refutations" placeholder="针对对方主张逐条反驳"></textarea>
            </div>
            <div class="form-group">
                <label>四、法律依据</label>
                <textarea id="lawBasis" placeholder="引用相关法律条款，如《民法典》第X条、第Y条"></textarea>
            </div>
            <div class="form-group">
                <label>五、结论与诉讼请求</label>
                <textarea id="conclusion" placeholder="总结我方观点，提出明确的代理意见"></textarea>
            </div>

            <button class="btn" onclick="generateDoc()">生成代理意见</button>
        </div>

        <div class="result" id="result">
            <h4>📄 代理意见预览</h4>
            <pre id="docPreview"></pre>
            <button class="btn preview-btn" onclick="downloadDoc()">⬇️ 下载Word文档</button>
        </div>

        <footer>
            <p>© 2026 张大壮律师 | 专业 · 可靠 · 负责</p>
        </footer>
    </div>

    <script>
        let currentDoc = null;

        function generateDoc() {
            if (!document.getElementById('factFindings').value.trim()) { alert('请填写案件事实认定'); return; }
            if (!document.getElementById('legalOpinions').value.trim()) { alert('请填写核心法律观点'); return; }

            const caseNo = document.getElementById('caseNo').value.trim();
            const caseType = document.getElementById('caseType').value.trim();
            const court = document.getElementById('court').value.trim();
            const lawyer = document.getElementById('lawyer').value.trim();
            const client = document.getElementById('client').value.trim();
            const opponent = document.getElementById('opponent').value.trim();
            const factFindings = document.getElementById('factFindings').value.trim();
            const legalOpinions = document.getElementById('legalOpinions').value.trim();
            const refutations = document.getElementById('refutations').value.trim();
            const lawBasis = document.getElementById('lawBasis').value.trim();
            const conclusion = document.getElementById('conclusion').value.trim();

            const today = new Date();
            const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;

            const docContent = `代理意见

${caseNo ? `案号：${caseNo}` : ''}${caseType ? `    案由：${caseType}` : ''}
${court ? `审理法院：${court}` : ''}

委托代理人：${lawyer || '待填写'}
委托方（当事人）：${client || '待填写'}
对方当事人：${opponent || '待填写'}
出具日期：${dateStr}

═══════════════════════════════════════════

${lawyer || '某'}律师代理意见

${client || '当事人'}诉${opponent || '对方'}一案，作为${client || '当事人'}的委托代理人，现提出如下代理意见：

一、我方对案件事实的认定

${factFindings}

二、我方核心法律观点

${legalOpinions}

${refutations ? `三、对对方观点的反驳\n\n${refutations}` : ''}

${lawBasis ? `四、法律依据\n\n${lawBasis}` : ''}

${conclusion ? `五、结论\n\n${conclusion}` : ''}

═══════════════════════════════════════════

以上代理意见，请法庭予以采纳。

此致

${court || '人民法院'}

代理律师（签字）：__________
${lawyer || ''}
${dateStr}`;

            document.getElementById('docPreview').textContent = docContent;
            document.getElementById('result').style.display = 'block';
            currentDoc = docContent;
        }

        function downloadDoc() {
            if (!currentDoc) return;
            const blob = new Blob(['\ufeff' + currentDoc], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `代理意见_${client || new Date().toISOString().slice(0,10)}.doc`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
