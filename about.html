        .contact-info { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .contact-item .icon { font-size: 2em; margin-bottom: 10px; }
        .contact-item a { color: #159895; text-decoration: none; font-size: 1.1em; }
        footer { text-align: center; color: #888; font-size: 0.95em; }
